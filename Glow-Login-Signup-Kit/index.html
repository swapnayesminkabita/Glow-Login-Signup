<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
    <div class="circle-container" id="circlecontainer"></div>
    <div class="login-box">
        <h2>Login</h2>
           
        <form action="" id="loginform">
            <div class="input-group">
                <input type="email" placeholder="Email" required>
                <span class="input-icon"><i class="bi bi-envelope-at"></i></span>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
                <span class="input-icon"><i class="bi bi-lock"></i> </span>
            </div>
            <div class="forget-password">
                <a href="#">Forget Your Password</a>
            </div>
            <button type="submit" class="login-btn">LOGIN</button>
        </form>
        <div class="social-login"> 
            <p>Log in with</p>
            <div class="social-icons">
                <div class="social-icon facebook"><i class="bi bi-facebook"></i></div>
                <div class="social-icon twitter"><i class="bi bi-twitter-x"></i></div>
                <div class="social-icon google"><i class="bi bi-google"></i></div>
        </div>
                
            </div>
            
        <div class="signup-link">
            <a href="signup.html">Sign Up</a>
        </div>
        
        
    </div>
   </div>
 <script src="main.js"></script>
</body>
</html>
