<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
    <div class="circle-container" id="circlecontainer"></div>
    <div class="login-box">
        <h2>Register</h2>
           
        <form action="#" id="signupform">
            <div class="input-group">
                <input type="text" placeholder="Full Name" required>
                <span class="input-icon"><i class="bi bi-person"></i></span>
            </div>
            <div class="input-group">
                <input type="email" placeholder="Email Address" required>
                <span class="input-icon"><i class="bi bi-envelope-at"></i></span>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
                <span class="input-icon"><i class="bi bi-lock"></i> </span>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Confirm Password" required>
                <span class="input-icon"><i class="bi bi-shield-check"></i> </span>
            </div>
            
            <button type="submit" class="login-btn">CREATE ACCOUNT</button>
        </form>

        <div class="social-login"> 
            <p>Or sign up with</p>
            <div class="social-icons">
                <div class="social-icon facebook"><i class="bi bi-facebook"></i></div>
                <div class="social-icon twitter"><i class="bi bi-twitter-x"></i></div>
                <div class="social-icon google"><i class="bi bi-google"></i></div>
            </div>
        </div>

        <div class="signup-link">
            <p style="color: rgba(255,255,255,0.6); font-size: 14px;">Already have an account? 
                <a href="index.html">Log In</a>
            </p>
        </div>
    </div>
   </div>
 <script src="main.js"></script>
</body>
</html>
